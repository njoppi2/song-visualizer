[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "songviz"
version = "0.0.0"
description = "Generate a music-reactive video from an audio file."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Proprietary"}
authors = [{name = "SongViz Contributors"}]
dependencies = [
  "numpy>=1.24",
  "librosa>=0.10.1",
  "soundfile>=0.12",
  "Pillow>=10.0",
]

[project.optional-dependencies]
test = [
  "pytest>=7.4",
]

[project.scripts]
songviz = "songviz.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
